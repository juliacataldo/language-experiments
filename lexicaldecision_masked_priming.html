<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Masked Priming Lexical Decision Experiment</title>

    <!-- jsPsych core files -->
    <script src="jspsych/jspsych.js"></script>
    <link href="jspsych/jspsych.css" rel="stylesheet" type="text/css">

    <!-- Your local saving helper -->
    <script src="jspsych/saveData.js"></script>

    <!-- Plugin used throughout this experiment -->
    <script src="jspsych/plugin-html-keyboard-response.js"></script>

    <style>
      html,
      body {
        background-color: rgb(127, 127, 127);
      }

      .jspsych-display-element,
      .jspsych-content {
        color: #ffffff;
      }

      .text-screen {
        max-width: 850px;
        margin: 0 auto;
        text-align: left;
        font-size: 20px;
        line-height: 1.5;
      }

      .text-screen h1,
      .text-screen h2 {
        text-align: center;
      }

      .continue-prompt {
        margin-top: 35px;
        text-align: center;
        font-weight: bold;
      }

      /*
       * The mask, prime, and target use the same font properties and location.
       * A monospace font helps keep letter positions visually stable.
       */
      .word-stimulus {
        font-family: "Courier New", Courier, monospace;
        font-size: 48px;
        font-weight: bold;
        letter-spacing: 2px;
        text-align: center;
      }

      .feedback-correct {
        font-size: 32px;
        font-weight: bold;
      }

      .feedback-incorrect {
        font-size: 32px;
        font-weight: bold;
      }
    </style>
  </head>

  <body></body>

  <script>
    // ================================================================
    // 1. GENERAL SETTINGS
    // ================================================================

    /*
     * These constants let you change the experiment's timing in one place.
     * The target duration is not specified because it stays on screen until
     * the participant presses F or J.
     */
    var MASK_DURATION_MS = 500;
    var PRIME_DURATION_MS = 50;
    var FEEDBACK_DURATION_MS = 750;
    var PRACTICE_PASS_THRESHOLD = 0.80;

    var jsPsych = initJsPsych({
      show_progress_bar: true,

      /*
       * We update the progress bar manually after each experimental block.
       * This prevents repeated practice attempts from distorting the bar.
       */
      auto_update_progress_bar: false,
      message_progress_bar: "Experiment progress"
    });

    var timeline = [];


    // ================================================================
    // 2. HELPER FUNCTIONS
    // ================================================================

    function displayWord(text) {
      return (
        '<div class="word-stimulus">' +
        text +
        '</div>'
      );
    }

    function calculateAccuracy(dataCollection) {
      var total = dataCollection.count();

      if (total === 0) {
        return 0;
      }

      var numberCorrect =
        dataCollection.filter({ correct: true }).count();

      return numberCorrect / total;
    }


    // ================================================================
    // 3. CONSENT SCREEN
    // ================================================================

    /*
     * Replace the placeholder paragraphs below with the exact text approved
     * by your IRB. Do not replace the final consent instructions unless your
     * approved procedure uses a different response.
     */
    var consent_screen = {
      type: jsPsychHtmlKeyboardResponse,

      stimulus: `
        <div class="text-screen">
          <h1>Research Study</h1>

          <p>
            <!-- PASTE YOUR BRIEF STUDY EXPLANATION HERE -->
            You are invited to participate in a study about language processing.
          </p>

          <h2>Consent Form</h2>

          <p>
            <!-- PASTE YOUR COMPLETE IRB-APPROVED CONSENT FORM HERE -->
            Insert the approved consent-form text here.
          </p>

          <p class="continue-prompt">
            Press <strong>C</strong> if you have read the information above,
            agree to participate, and wish to continue.
          </p>

          <p class="continue-prompt">
            Press <strong>X</strong> if you do not agree to participate.
          </p>
        </div>
      `,

      choices: ["c", "x"],

      data: {
        task: "consent"
      },

      on_finish: function(data) {
        data.consent_given =
          jsPsych.pluginAPI.compareKeys(data.response, "c");

        if (!data.consent_given) {
          jsPsych.abortExperiment(
            "<p>You chose not to participate. You may close this window.</p>"
          );
        }
      }
    };

    timeline.push(consent_screen);


    // ================================================================
    // 4. TASK INSTRUCTIONS
    // ================================================================

    var instructions_screen = {
      type: jsPsychHtmlKeyboardResponse,

      stimulus: `
        <div class="text-screen">
          <h1>Instructions</h1>

          <p>
            On each trial, a row of number signs will appear briefly in the
            center of the screen. It will be followed by a letter string.
          </p>

          <p>
            Decide whether the final letter string is a real word in Brazilian
            Portuguese.
          </p>

          <p>
            Press <strong>J</strong> with your right hand if it is a
            <strong>real word</strong>.
          </p>

          <p>
            Press <strong>F</strong> with your left hand if it is
            <strong>not a word</strong>.
          </p>

          <p>
            Respond as quickly and accurately as possible. The final letter
            string will remain on the screen until you respond.
          </p>

          <p class="continue-prompt">
            Press any key to continue to the practice.
          </p>
        </div>
      `,

      data: {
        task: "instructions"
      }
    };

    timeline.push(instructions_screen);


    // ================================================================
    // 5. PRACTICE STIMULI
    // ================================================================

    /*
     * Replace these six examples with your actual practice items.
     *
     * Each item needs:
     * - item_id: a unique identifier
     * - prime: the briefly displayed prime
     * - target: the string that remains until response
     * - lexicality: "word" or "nonword"
     * - correct_response: "j" for words and "f" for nonwords
     */
    var practice_stimuli = [
      {
        item_id: "practice_01",
        prime: "casa",
        target: "CASA",
        lexicality: "word",
        correct_response: "j"
      },
      {
        item_id: "practice_02",
        prime: "livro",
        target: "LIVRO",
        lexicality: "word",
        correct_response: "j"
      },
      {
        item_id: "practice_03",
        prime: "verde",
        target: "VERDE",
        lexicality: "word",
        correct_response: "j"
      },
      {
        item_id: "practice_04",
        prime: "pufra",
        target: "PUFRA",
        lexicality: "nonword",
        correct_response: "f"
      },
      {
        item_id: "practice_05",
        prime: "dalte",
        target: "DALTE",
        lexicality: "nonword",
        correct_response: "f"
      },
      {
        item_id: "practice_06",
        prime: "nimpo",
        target: "NIMPO",
        lexicality: "nonword",
        correct_response: "f"
      }
    ];


    // ================================================================
    // 6. PRACTICE TRIAL SEQUENCE
    // ================================================================

    var practice_intro = {
      type: jsPsychHtmlKeyboardResponse,

      stimulus: `
        <div class="text-screen">
          <h1>Practice</h1>

          <p>
            You will now complete six practice trials.
          </p>

          <p>
            After each response, you will receive feedback.
          </p>

          <p>
            You must answer more than 80% of the practice trials correctly
            before beginning the real experiment. With six trials, this means
            that you need at least five correct responses.
          </p>

          <p class="continue-prompt">
            Press any key to begin the practice.
          </p>
        </div>
      `,

      data: {
        task: "practice_instructions"
      }
    };

    timeline.push(practice_intro);


    var practice_mask = {
      type: jsPsychHtmlKeyboardResponse,

      stimulus: displayWord("######"),

      choices: "NO_KEYS",
      trial_duration: MASK_DURATION_MS,

      data: {
        task: "practice_mask",
        phase: "practice",
        item_id: jsPsych.timelineVariable("item_id")
      }
    };


    var practice_prime = {
      type: jsPsychHtmlKeyboardResponse,

      stimulus: function() {
        var prime =
          jsPsych.evaluateTimelineVariable("prime");

        return displayWord(prime);
      },

      choices: "NO_KEYS",
      trial_duration: PRIME_DURATION_MS,

      data: {
        task: "practice_prime",
        phase: "practice",
        item_id: jsPsych.timelineVariable("item_id"),
        prime: jsPsych.timelineVariable("prime"),
        target: jsPsych.timelineVariable("target")
      }
    };


    var practice_target = {
      type: jsPsychHtmlKeyboardResponse,

      stimulus: function() {
        var target =
          jsPsych.evaluateTimelineVariable("target");

        return displayWord(target);
      },

      choices: ["f", "j"],

      data: {
        task: "practice_target",
        phase: "practice",
        item_id: jsPsych.timelineVariable("item_id"),
        prime: jsPsych.timelineVariable("prime"),
        target: jsPsych.timelineVariable("target"),
        lexicality: jsPsych.timelineVariable("lexicality"),
        correct_response:
          jsPsych.timelineVariable("correct_response")
      },

      on_finish: function(data) {
        data.correct =
          jsPsych.pluginAPI.compareKeys(
            data.response,
            data.correct_response
          );
      }
    };


    var practice_feedback = {
      type: jsPsychHtmlKeyboardResponse,

      stimulus: function() {
        var lastTarget =
          jsPsych.data
            .get()
            .filter({ task: "practice_target" })
            .last(1)
            .values()[0];

        if (lastTarget.correct) {
          return (
            '<p class="feedback-correct">Correct!</p>'
          );
        }

        var correctKey =
          lastTarget.correct_response.toUpperCase();

        return (
          '<p class="feedback-incorrect">Incorrect.</p>' +
          '<p>The correct response was <strong>' +
          correctKey +
          '</strong>.</p>'
        );
      },

      choices: "NO_KEYS",
      trial_duration: FEEDBACK_DURATION_MS,

      data: {
        task: "practice_feedback",
        phase: "practice"
      }
    };


    var practice_procedure = {
      timeline: [
        practice_mask,
        practice_prime,
        practice_target,
        practice_feedback
      ],

      timeline_variables: practice_stimuli,
      randomize_order: true
    };


    /*
     * This screen is part of the loop, so participants see it after every
     * practice attempt. It calculates accuracy from the most recent six
     * practice target trials only.
     */
    var practice_result_screen = {
      type: jsPsychHtmlKeyboardResponse,

      stimulus: function() {
        var latestAttempt =
          jsPsych.data
            .get()
            .filter({ task: "practice_target" })
            .last(practice_stimuli.length);

        var accuracy =
          calculateAccuracy(latestAttempt);

        var accuracyPercent =
          Math.round(accuracy * 100);

        if (accuracy > PRACTICE_PASS_THRESHOLD) {
          return `
            <div class="text-screen">
              <h1>Practice complete</h1>

              <p>
                Your practice accuracy was
                <strong>${accuracyPercent}%</strong>.
              </p>

              <p>
                You may now proceed to the real experiment.
              </p>

              <p class="continue-prompt">
                Press any key to continue.
              </p>
            </div>
          `;
        }

        return `
          <div class="text-screen">
            <h1>More practice is needed</h1>

            <p>
              Your practice accuracy was
              <strong>${accuracyPercent}%</strong>.
            </p>

            <p>
              You need more than 80% accuracy to proceed, so the six practice
              trials will restart.
            </p>

            <p class="continue-prompt">
              Press any key to repeat the practice.
            </p>
          </div>
        `;
      },

      data: {
        task: "practice_result"
      },

      on_finish: function(data) {
        var latestAttempt =
          jsPsych.data
            .get()
            .filter({ task: "practice_target" })
            .last(practice_stimuli.length);

        var accuracy =
          calculateAccuracy(latestAttempt);

        data.practice_accuracy = accuracy;
        data.practice_passed =
          accuracy > PRACTICE_PASS_THRESHOLD;
      }
    };


    /*
     * loop_function receives the data from the most recent practice
     * iteration. Returning true repeats the practice. Returning false allows
     * the experiment to continue.
     */
    var practice_loop = {
      timeline: [
        practice_procedure,
        practice_result_screen
      ],

      loop_function: function(data) {
        var practiceTargets =
          data.filter({ task: "practice_target" });

        var accuracy =
          calculateAccuracy(practiceTargets);

        return accuracy <= PRACTICE_PASS_THRESHOLD;
      }
    };

    timeline.push(practice_loop);


    // ================================================================
    // 7. REAL-EXPERIMENT START SCREEN
    // ================================================================

    var real_experiment_start = {
      type: jsPsychHtmlKeyboardResponse,

      stimulus: `
        <div class="text-screen">
          <h1>The real experiment is about to begin</h1>

          <p>
            The experiment contains four blocks. You will have a short pause
            after each of the first three blocks.
          </p>

          <p>
            The practice feedback will no longer appear.
          </p>

          <p>
            Remember: press <strong>J</strong> for a real word and
            <strong>F</strong> for a nonword.
          </p>

          <p class="continue-prompt">
            Press any key when you are ready to begin.
          </p>
        </div>
      `,

      data: {
        task: "real_experiment_start"
      },

      on_finish: function() {
        jsPsych.progressBar.progress = 0;
      }
    };

    timeline.push(real_experiment_start);


    // ================================================================
    // 8. REAL-EXPERIMENT STIMULI
    // ================================================================

    /*
     * These are illustrative placeholders. Replace them with your complete
     * stimulus list.
     *
     * Each item needs:
     * - item_id
     * - block: 1, 2, 3, or 4
     * - condition
     * - prime
     * - target
     * - lexicality
     * - correct_response
     *
     * The items are randomized WITHIN each block, but items do not move
     * between blocks.
     */
    var main_stimuli = [
      {
        item_id: "main_001",
        block: 1,
        condition: "example_condition_A",
        prime: "house",
        target: "HOUSE",
        lexicality: "word",
        correct_response: "j"
      },
      {
        item_id: "main_002",
        block: 1,
        condition: "example_condition_B",
        prime: "bread",
        target: "BREAD",
        lexicality: "word",
        correct_response: "j"
      },
      {
        item_id: "main_003",
        block: 1,
        condition: "example_nonword",
        prime: "florp",
        target: "FLORP",
        lexicality: "nonword",
        correct_response: "f"
      },

      {
        item_id: "main_004",
        block: 2,
        condition: "example_condition_A",
        prime: "table",
        target: "TABLE",
        lexicality: "word",
        correct_response: "j"
      },
      {
        item_id: "main_005",
        block: 2,
        condition: "example_condition_B",
        prime: "green",
        target: "GREEN",
        lexicality: "word",
        correct_response: "j"
      },
      {
        item_id: "main_006",
        block: 2,
        condition: "example_nonword",
        prime: "blint",
        target: "BLINT",
        lexicality: "nonword",
        correct_response: "f"
      },

      {
        item_id: "main_007",
        block: 3,
        condition: "example_condition_A",
        prime: "music",
        target: "MUSIC",
        lexicality: "word",
        correct_response: "j"
      },
      {
        item_id: "main_008",
        block: 3,
        condition: "example_condition_B",
        prime: "water",
        target: "WATER",
        lexicality: "word",
        correct_response: "j"
      },
      {
        item_id: "main_009",
        block: 3,
        condition: "example_nonword",
        prime: "dremp",
        target: "DREMP",
        lexicality: "nonword",
        correct_response: "f"
      },

      {
        item_id: "main_010",
        block: 4,
        condition: "example_condition_A",
        prime: "light",
        target: "LIGHT",
        lexicality: "word",
        correct_response: "j"
      },
      {
        item_id: "main_011",
        block: 4,
        condition: "example_nonword",
        prime: "glusk",
        target: "GLUSK",
        lexicality: "nonword",
        correct_response: "f"
      },
      {
        item_id: "main_012",
        block: 4,
        condition: "example_nonword",
        prime: "prost",
        target: "PROST",
        lexicality: "nonword",
        correct_response: "f"
      }
    ];


    // ================================================================
    // 9. REAL-EXPERIMENT TRIAL SEQUENCE
    // ================================================================

    var main_mask = {
      type: jsPsychHtmlKeyboardResponse,

      stimulus: displayWord("######"),

      choices: "NO_KEYS",
      trial_duration: MASK_DURATION_MS,

      data: {
        task: "main_mask",
        phase: "main",
        block: jsPsych.timelineVariable("block"),
        item_id: jsPsych.timelineVariable("item_id")
      }
    };


    var main_prime = {
      type: jsPsychHtmlKeyboardResponse,

      stimulus: function() {
        var prime =
          jsPsych.evaluateTimelineVariable("prime");

        return displayWord(prime);
      },

      choices: "NO_KEYS",
      trial_duration: PRIME_DURATION_MS,

      data: {
        task: "main_prime",
        phase: "main",
        block: jsPsych.timelineVariable("block"),
        item_id: jsPsych.timelineVariable("item_id"),
        condition: jsPsych.timelineVariable("condition"),
        prime: jsPsych.timelineVariable("prime"),
        target: jsPsych.timelineVariable("target")
      }
    };


    var main_target = {
      type: jsPsychHtmlKeyboardResponse,

      stimulus: function() {
        var target =
          jsPsych.evaluateTimelineVariable("target");

        return displayWord(target);
      },

      /*
       * No trial_duration is specified. Therefore, the target remains visible
       * until the participant presses F or J.
       */
      choices: ["f", "j"],

      data: {
        task: "main_target",
        phase: "main",
        block: jsPsych.timelineVariable("block"),
        item_id: jsPsych.timelineVariable("item_id"),
        condition: jsPsych.timelineVariable("condition"),
        prime: jsPsych.timelineVariable("prime"),
        target: jsPsych.timelineVariable("target"),
        lexicality: jsPsych.timelineVariable("lexicality"),
        correct_response:
          jsPsych.timelineVariable("correct_response")
      },

      on_finish: function(data) {
        data.correct =
          jsPsych.pluginAPI.compareKeys(
            data.response,
            data.correct_response
          );
      }
    };


    /*
     * This function creates each pause screen. Passing the block number into
     * the function avoids writing nearly identical pause code three times.
     */
    function makePauseScreen(completedBlock) {
      return {
        type: jsPsychHtmlKeyboardResponse,

        stimulus: `
          <div class="text-screen">
            <h1>Pause</h1>

            <p>
              You have completed block ${completedBlock} of 4.
            </p>

            <p>
              You may take a short break.
            </p>

            <p class="continue-prompt">
              Press any key when you are ready to continue.
            </p>
          </div>
        `,

        data: {
          task: "pause",
          block_completed: completedBlock
        },

        on_load: function() {
          jsPsych.progressBar.progress =
            completedBlock / 4;
        }
      };
    }


    /*
     * Build the four blocks. Each block uses only the stimuli whose "block"
     * value matches the current block number.
     */
    for (
      var blockNumber = 1;
      blockNumber <= 4;
      blockNumber++
    ) {
      var stimuliForThisBlock =
        main_stimuli.filter(function(item) {
          return item.block === blockNumber;
        });

      if (stimuliForThisBlock.length === 0) {
        throw new Error(
          "No stimuli were assigned to block " +
          blockNumber +
          "."
        );
      }

      var experimentalBlock = {
        timeline: [
          main_mask,
          main_prime,
          main_target
        ],

        timeline_variables: stimuliForThisBlock,
        randomize_order: true
      };

      timeline.push(experimentalBlock);

      if (blockNumber < 4) {
        timeline.push(
          makePauseScreen(blockNumber)
        );
      }
    }


    // ================================================================
    // 10. FINAL SUMMARY
    // ================================================================

    var final_screen = {
      type: jsPsychHtmlKeyboardResponse,

      stimulus: function() {
        var trials =
          jsPsych.data
            .get()
            .filter({ task: "main_target" });

        var correctTrials =
          trials.filter({ correct: true });

        var accuracy =
          calculateAccuracy(trials);

        var accuracyPercent =
          Math.round(accuracy * 100);

        var meanRt =
          correctTrials.count() > 0
            ? Math.round(
                correctTrials.select("rt").mean()
              )
            : "N/A";

        return `
          <div class="text-screen">
            <h1>All done. Thank you!</h1>

            <p>
              Your accuracy in the real experiment was
              <strong>${accuracyPercent}%</strong>.
            </p>

            <p>
              Your average response time on correct trials was
              <strong>${meanRt} ms</strong>.
            </p>

            <p class="continue-prompt">
              Press any key to save your data and finish.
            </p>
          </div>
        `;
      },

      data: {
        task: "final_summary"
      },

      on_load: function() {
        jsPsych.progressBar.progress = 1;
      }
    };

    timeline.push(final_screen);


    // ================================================================
    // 11. SAVE DATA
    // ================================================================

    var save_block = {
      type: jsPsychHtmlKeyboardResponse,

      stimulus:
        '<p style="font-size: 24px;">' +
        'Saving your data...' +
        '</p>',

      choices: "NO_KEYS",

      on_load: function() {
        jsPsych.progressBar.progress = 1;

        /*
         * The data rows include a built-in "stimulus" field containing HTML.
         * We remove that bulky column because the clean prime and target
         * values are already stored in separate columns.
         */
        var csvData =
          jsPsych.data
            .get()
            .ignore("stimulus")
            .csv();

        saveData(
          "masked_priming_ldt",
          csvData
        )
          .then(function() {
            var displayElement =
              document.querySelector(
                "#jspsych-content"
              ) ||
              jsPsych.getDisplayElement();

            displayElement.innerHTML =
              '<p style="font-size: 24px;">' +
              'Data saved successfully. ' +
              'You can close the window.' +
              '</p>';
          })
          .catch(function(error) {
            console.error(
              "Data-saving error:",
              error
            );

            var displayElement =
              document.querySelector(
                "#jspsych-content"
              ) ||
              jsPsych.getDisplayElement();

            displayElement.innerHTML =
              '<p style="font-size: 24px;">' +
              'The data could not be saved.' +
              '</p>' +
              '<p>' +
              error.message +
              '</p>';
          });
      }
    };

    timeline.push(save_block);


    // ================================================================
    // 12. START THE EXPERIMENT
    // ================================================================

    jsPsych.run(timeline);
  </script>
</html>
