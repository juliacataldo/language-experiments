  <body></body>

  <script>
    async function startExperiment() {
    // ================================================================
    // 1. GENERAL SETTINGS
    // ================================================================

    /*
     * These constants let you change the experiment's timing in one place.
     * The psychophysics plugin schedules these transitions with
     * requestAnimationFrame. The target has no end time, so it remains visible
     * until the participant presses F or J.
     */
    var MASK_DURATION_MS = 500;
    var PRIME_DURATION_MS = 56;
    var FEEDBACK_DURATION_MS = 750;
    var PRACTICE_PASS_THRESHOLD = 0.80;

    /*
     * Upload the approved consent PDF to the same folder as this file
     * and name it consent.pdf.
     */
    var CONSENT_PDF_FILE = "consent.pdf";

    /*
     * EDIT THESE TWO VALUES:
     * 1. Keep main_stimuli.csv in the same folder as this HTML file.
     * 2. Replace the placeholder with the Experiment ID from DataPipe.
     *
     * Do NOT paste your OSF token here. The token belongs only in your
     * private DataPipe account settings.
     */
    var MAIN_STIMULI_FILE = "main_stimuli.csv";
    var DATAPIPE_EXPERIMENT_ID = "0Zb0XHTy8RcV";

    /*
     * Automatic run-mode selection:
     * - localhost / 127.0.0.1 / 0.0.0.0 -> local Python saving
     * - every other hostname (including GitHub Pages) -> DataPipe saving
     */
    var LOCAL_HOSTNAMES = ["localhost", "127.0.0.1", "0.0.0.0"];
    var IS_LOCAL_RUN =
      LOCAL_HOSTNAMES.includes(window.location.hostname);
    var RUN_MODE = IS_LOCAL_RUN ? "local" : "online_datapipe";

    if (window.location.protocol === "file:") {
      throw new Error(
        "This version loads its stimuli from main_stimuli.csv. " +
        "Please run it through the Python server at " +
        "http://localhost:8000/ rather than double-clicking exp2.html."
      );
    }

    if (
      !IS_LOCAL_RUN &&
      DATAPIPE_EXPERIMENT_ID ===
        "PASTE_YOUR_DATAPIPE_EXPERIMENT_ID_HERE"
    ) {
      throw new Error(
        "Online saving is not configured yet. Replace " +
        "PASTE_YOUR_DATAPIPE_EXPERIMENT_ID_HERE with the Experiment ID " +
        "shown in your DataPipe experiment dashboard."
      );
    }

    var jsPsych = initJsPsych({
      show_progress_bar: true,

      /*
       * We update the progress bar manually after each experimental block.
       * This prevents repeated practice attempts from distorting the bar.
       */
      auto_update_progress_bar: false,
      message_progress_bar: "Experiment progress"
    });

    var timeline = [];

    /*
     * Generate a new random eight-digit participant number for every run.
     * URL parameters, including Prolific IDs, are deliberately ignored.
     */
    function generateRandomEightDigitId() {
      if (
        window.crypto &&
        window.crypto.getRandomValues
      ) {
        var randomValues =
          new Uint32Array(1);

        window.crypto.getRandomValues(
          randomValues
        );

        return String(
          10000000 +
          (
            randomValues[0] %
            90000000
          )
        );
      }

      return String(
        Math.floor(
          10000000 +
          Math.random() * 90000000
        )
      );
    }

    var participantId =
      generateRandomEightDigitId();

    var sessionTimestamp = new Date()
      .toISOString()
      .replace(/[^0-9]/g, "")
      .slice(0, 14);

    var dataFileStem =
      "masked_priming_" +
      participantId +
      "_" +
      sessionTimestamp;

    jsPsych.data.addProperties({
      participant_id: participantId,
      run_mode: RUN_MODE,
      session_timestamp_utc: sessionTimestamp
    });


    // ================================================================
    // 2. HELPER FUNCTIONS
    // ================================================================

    /*
     * Create a centered text object for the psychophysics canvas.
     * showEndTime may be omitted so that the target remains visible until
     * the participant responds.
     */
    function makePsychophysicsText(
      content,
      showStartTime,
      showEndTime
    ) {
      var stimulus = {
        obj_type: "text",
        content: content,
        startX: 0,
        startY: 0,
        origin_center: true,
        fontSize: "48px",
        fontFamily: "Courier New, Courier, monospace",
        fontWeight: "bold",
        text_color: "#ffffff",
        show_start_time: showStartTime
      };

      if (showEndTime !== undefined) {
        stimulus.show_end_time = showEndTime;
      }

      return stimulus;
    }

    function calculateAccuracy(dataCollection) {
      var total = dataCollection.count();

      if (total === 0) {
        return 0;
      }

      var numberCorrect =
        dataCollection.filter({ correct: true }).count();

      return numberCorrect / total;
    }


    /*
     * Parse an ordinary comma-delimited CSV, including quoted fields and
     * commas inside quoted fields. Save the spreadsheet from Excel as
     * "CSV UTF-8 (Comma delimited)".
     */
    function parseCSV(csvText) {
      var rows = [];
      var row = [];
      var field = "";
      var insideQuotes = false;

      for (var index = 0; index < csvText.length; index++) {
        var character = csvText[index];
        var nextCharacter = csvText[index + 1];

        if (character === '"') {
          if (insideQuotes && nextCharacter === '"') {
            field += '"';
            index++;
          } else {
            insideQuotes = !insideQuotes;
          }
        } else if (character === "," && !insideQuotes) {
          row.push(field);
          field = "";
        } else if (
          (character === "\n" || character === "\r") &&
          !insideQuotes
        ) {
          if (character === "\r" && nextCharacter === "\n") {
            index++;
          }

          row.push(field);
          field = "";

          if (row.some(function(value) { return value.trim() !== ""; })) {
            rows.push(row);
          }

          row = [];
        } else {
          field += character;
        }
      }

      row.push(field);
      if (row.some(function(value) { return value.trim() !== ""; })) {
        rows.push(row);
      }

      return rows;
    }

    async function loadMainStimuli(filename) {
      var response = await fetch(filename, { cache: "no-store" });

      if (!response.ok) {
        throw new Error(
          "Could not load " + filename +
          ". The server returned HTTP " + response.status + "."
        );
      }

      var csvText = await response.text();
      var parsedRows = parseCSV(csvText);

      if (parsedRows.length < 2) {
        throw new Error(
          filename + " must contain a header row and at least one stimulus."
        );
      }

      var headers = parsedRows[0].map(function(header) {
        return header.replace(/^\uFEFF/, "").trim();
      });

      if (headers.some(function(header) { return header === ""; })) {
        throw new Error(
          filename + " contains a blank column name in its first row."
        );
      }

      if (new Set(headers).size !== headers.length) {
        throw new Error(
          filename + " contains duplicate column names."
        );
      }

      var requiredColumns = [
        "item_id",
        "condition",
        "prime",
        "target",
        "lexicality",
        "correct_response"
      ];

      requiredColumns.forEach(function(columnName) {
        if (!headers.includes(columnName)) {
          throw new Error(
            filename + " is missing the required column \"" +
            columnName + "\"."
          );
        }
      });

      var stimuli = parsedRows.slice(1).map(function(values, rowIndex) {
        var item = {};

        headers.forEach(function(header, columnIndex) {
          item[header] = String(values[columnIndex] || "").trim();
        });

        item.lexicality = item.lexicality.toLowerCase();
        item.correct_response = item.correct_response.toLowerCase();

        if (!item.item_id || !item.prime || !item.target) {
          throw new Error(
            "CSV row " + (rowIndex + 2) +
            " has a blank item_id, prime, or target."
          );
        }

        if (!["word", "nonword"].includes(item.lexicality)) {
          throw new Error(
            "CSV row " + (rowIndex + 2) +
            " has lexicality \"" + item.lexicality +
            "\". Use word or nonword."
          );
        }

        if (!["f", "j"].includes(item.correct_response)) {
          throw new Error(
            "CSV row " + (rowIndex + 2) +
            " has correct_response \"" + item.correct_response +
            "\". Use f or j."
          );
        }

        return item;
      });

      var itemIds = stimuli.map(function(item) { return item.item_id; });
      if (new Set(itemIds).size !== itemIds.length) {
        throw new Error(
          filename + " contains duplicate item_id values."
        );
      }

      return {
        headers: headers,
        stimuli: stimuli
      };
    }


    /*
     * Shuffle the complete stimulus list and divide it into four blocks
     * that differ in size by at most one trial. No block column is needed
     * in the spreadsheet.
     */
    function divideIntoFourBlocks(stimuli) {
      if (stimuli.length < 4) {
        throw new Error(
          "The main stimulus spreadsheet must contain at least four trials."
        );
      }

      var shuffledStimuli =
        jsPsych.randomization.shuffle(
          stimuli.slice()
        );

      var blocks = [[], [], [], []];
      var baseBlockSize =
        Math.floor(
          shuffledStimuli.length / 4
        );
      var remainder =
        shuffledStimuli.length % 4;
      var stimulusIndex = 0;
      var overallOrder = 1;

      for (
        var blockIndex = 0;
        blockIndex < 4;
        blockIndex++
      ) {
        var thisBlockSize =
          baseBlockSize +
          (
            blockIndex < remainder
              ? 1
              : 0
          );

        for (
          var position = 1;
          position <= thisBlockSize;
          position++
        ) {
          blocks[blockIndex].push(
            Object.assign(
              {},
              shuffledStimuli[
                stimulusIndex
              ],
              {
                experimental_block:
                  blockIndex + 1,
                block_trial:
                  position,
                randomized_trial_order:
                  overallOrder
              }
            )
          );

          stimulusIndex++;
          overallOrder++;
        }
      }

      return blocks;
    }


    // ================================================================
    // 3. CONSENT SCREEN
    // ================================================================

    /*
     * The consent form is displayed from consent.pdf. Upload that PDF to
     * the same folder as exp2.html.
     */
    var consent_screen = {
      type: jsPsychHtmlKeyboardResponse,

      stimulus: `
        <div class="text-screen">
          <h1>Welcome to this experiment!</h1>

          <p>
            Please read the consent form below before deciding whether
            you would like to participate.
          </p>

          <iframe
            src="${CONSENT_PDF_FILE}"
            title="Research consent form"
            style="
              width:100%;
              height:65vh;
              border:1px solid rgba(255,255,255,0.65);
              background:white;
            "
          ></iframe>

          <p style="text-align:center;">
            <a
              href="${CONSENT_PDF_FILE}"
              target="_blank"
              rel="noopener"
              style="color:white;text-decoration:underline;"
            >
              Open the consent form in a new tab
            </a>
          </p>

          <p class="continue-prompt">
            If you have read the consent form and agree to participate,
            select <strong>I agree and wish to continue</strong>.
          </p>

          <p class="continue-prompt">
            If you do not agree to participate, select
            <strong>I do not agree</strong>.
          </p>

          <div style="
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:16px;
            margin-top:24px;
          ">
            <button
              id="consent-accept"
              type="button"
              style="font-size:18px;padding:12px 18px;cursor:pointer;"
            >
              I agree and wish to continue
            </button>

            <button
              id="consent-decline"
              type="button"
              style="font-size:18px;padding:12px 18px;cursor:pointer;"
            >
              I do not agree
            </button>
          </div>
        </div>
      `,

      choices: ["c", "x"],

      data: {
        task: "consent"
      },

      on_load: function() {
        document
          .getElementById("consent-accept")
          .addEventListener(
            "click",
            function() {
              jsPsych.finishTrial({
                response: "c",
                response_method: "button"
              });
            },
            { once: true }
          );

        document
          .getElementById("consent-decline")
          .addEventListener(
            "click",
            function() {
              jsPsych.finishTrial({
                response: "x",
                response_method: "button"
              });
            },
            { once: true }
          );
      },

      on_finish: function(data) {
        data.consent_given =
          jsPsych.pluginAPI.compareKeys(
            data.response,
            "c"
          );

        if (!data.response_method) {
          data.response_method =
            "keyboard";
        }

        if (!data.consent_given) {
          jsPsych.abortExperiment(
            "<p>Thank you for your interest! You chose not to participate. " +
            "You may close this window.</p>"
          );
        }
      }
    };

    timeline.push(consent_screen);


    // ================================================================
    // 4. TASK INSTRUCTIONS
    // ================================================================

    var instructions_screen = {
      type: jsPsychHtmlKeyboardResponse,

      stimulus: `
        <div class="text-screen">
          <h1>Instructions</h1>

          <p>
            In this experiment, you will see various letter strings.
          </p>

          <p>
            When you see a letter string, indicate as quickly and
            accurately as possible whether it is:
          </p>

          <ul>
            <li>
              A real Portuguese word:
              press the <strong>J</strong> key using your
              <strong>right index finger</strong>.
            </li>

            <li>
              Not a real Portuguese word:
              press the <strong>F</strong> key using your
              <strong>left index finger</strong>.
            </li>
          </ul>

          <p>
            Please keep your index fingers on the keys at all times
            and do not swap your hands: use the left hand for the
            F key and the right hand for the J key.
          </p>

          <p>
            The practice section will take approximately a couple of
            minutes, and the main experiment will take approximately
            15 minutes. The main experiment is divided into four
            blocks, with three breaks.
          </p>

          <p>
            Please complete the study in one session. Do not begin the
            experiment if you do not have sufficient time to complete
            it.
          </p>

          <p>
            When you are done with the experiment, you will be asked to
            fill out a survey about your language background.
          </p>

          <p>
            Please remember that it is important that you respond as
            quickly and accurately as possible.
          </p>

          <p class="continue-prompt">
            Press any key to continue to the practice.
          </p>
        </div>
      `,

      data: {
        task: "instructions"
      }
    };

    timeline.push(instructions_screen);


    // ================================================================
    // 5. PRACTICE STIMULI
    // ================================================================

    /*
     * Replace these six examples with your actual practice items.
     *
     * Each item needs:
     * - item_id: a unique identifier
     * - prime: the briefly displayed prime
     * - target: the string that remains until response
     * - lexicality: "word" or "nonword"
     * - correct_response: "j" for words and "f" for nonwords
     */
    var practice_stimuli = [
      {
        item_id: "practice_01",
        prime: "casa",
        target: "CASA",
        lexicality: "word",
        correct_response: "j"
      },
      {
        item_id: "practice_02",
        prime: "livro",
        target: "LIVRO",
        lexicality: "word",
        correct_response: "j"
      },
      {
        item_id: "practice_03",
        prime: "verde",
        target: "VERDE",
        lexicality: "word",
        correct_response: "j"
      },
      {
        item_id: "practice_04",
        prime: "pufra",
        target: "PUFRA",
        lexicality: "nonword",
        correct_response: "f"
      },
      {
        item_id: "practice_05",
        prime: "dalte",
        target: "DALTE",
        lexicality: "nonword",
        correct_response: "f"
      },
      {
        item_id: "practice_06",
        prime: "nimpo",
        target: "NIMPO",
        lexicality: "nonword",
        correct_response: "f"
      }
    ];


    // ================================================================
    // 6. PRACTICE TRIAL SEQUENCE
    // ================================================================

    var practice_intro = {
      type: jsPsychHtmlKeyboardResponse,

      stimulus: `
        <div class="text-screen">
          <h1>Practice</h1>

          <p>
            You will now complete six practice trials.
          </p>

          <p>
            After each response, you will receive feedback.
          </p>

          <p>
            Please remember to keep your right index finger in the J key and press it when you see a real word,
            and to place your left index finger in the F key, and press it when you see a nonword.
          </p>

          <p class="continue-prompt">
            Press any key to begin the practice.
          </p>
        </div>
      `,

      data: {
        task: "practice_instructions"
      }
    };

    timeline.push(practice_intro);


    /*
     * One psychophysics trial presents the complete sequence on one canvas:
     *
     *   mask:   0 ms to MASK_DURATION_MS
     *   prime:  MASK_DURATION_MS to target onset
     *   target: target onset until response
     *
     * response_start_time makes the plugin ignore F/J before target onset and
     * measures RT from target onset, rather than from the beginning of the mask.
     */
    var practice_masked_trial = {
      type: jsPsychPsychophysics,

      stimuli: [
        makePsychophysicsText(
          "######",
          0,
          MASK_DURATION_MS
        ),

        makePsychophysicsText(
          function() {
            return jsPsych.evaluateTimelineVariable("prime");
          },
          MASK_DURATION_MS,
          MASK_DURATION_MS + PRIME_DURATION_MS
        ),

        makePsychophysicsText(
          function() {
            return jsPsych.evaluateTimelineVariable("target");
          },
          MASK_DURATION_MS + PRIME_DURATION_MS
        )
      ],

      background_color: "rgb(127, 127, 127)",
      choices: ["f", "j"],
      response_start_time:
        MASK_DURATION_MS + PRIME_DURATION_MS,
      response_ends_trial: true,

      data: {
        task: "practice_target",
        phase: "practice",
        timing_method: "psychophysics_requestAnimationFrame",
        requested_mask_duration_ms: MASK_DURATION_MS,
        requested_prime_duration_ms: PRIME_DURATION_MS,
        target_onset_ms:
          MASK_DURATION_MS + PRIME_DURATION_MS,
        item_id: jsPsych.timelineVariable("item_id"),
        prime: jsPsych.timelineVariable("prime"),
        target: jsPsych.timelineVariable("target"),
        lexicality: jsPsych.timelineVariable("lexicality"),
        correct_response:
          jsPsych.timelineVariable("correct_response")
      },

      on_finish: function(data) {
        data.correct =
          jsPsych.pluginAPI.compareKeys(
            data.response,
            data.correct_response
          );
      }
    };


    var practice_feedback = {
      type: jsPsychHtmlKeyboardResponse,

      stimulus: function() {
        var lastTarget =
          jsPsych.data
            .get()
            .filter({ task: "practice_target" })
            .last(1)
            .values()[0];

        if (lastTarget.correct) {
          return (
            '<p class="feedback-correct">Correct!</p>'
          );
        }

        var correctKey =
          lastTarget.correct_response.toUpperCase();

        return (
          '<p class="feedback-incorrect">Incorrect.</p>' +
          '<p>The correct response was <strong>' +
          correctKey +
          '</strong>.</p>'
        );
      },

      choices: "NO_KEYS",
      trial_duration: FEEDBACK_DURATION_MS,

      data: {
        task: "practice_feedback",
        phase: "practice"
      }
    };


    var practice_procedure = {
      timeline: [
        practice_masked_trial,
        practice_feedback
      ],

      timeline_variables: practice_stimuli,
      randomize_order: true
    };


    /*
     * This screen is part of the loop, so participants see it after every
     * practice attempt. It calculates accuracy from the most recent six
     * practice target trials only.
     */
    var practice_result_screen = {
      type: jsPsychHtmlKeyboardResponse,

      stimulus: function() {
        var latestAttempt =
          jsPsych.data
            .get()
            .filter({ task: "practice_target" })
            .last(practice_stimuli.length);

        var accuracy =
          calculateAccuracy(latestAttempt);

        var accuracyPercent =
          Math.round(accuracy * 100);

        if (accuracy > PRACTICE_PASS_THRESHOLD) {
          return `
            <div class="text-screen">
              <h1>Practice complete</h1>

              <p>
                Congrats, your practice accuracy was
                <strong>${accuracyPercent}%</strong>!
              </p>

              <p>
                You may now proceed to the real experiment.
              </p>

              <p class="continue-prompt">
                Press any key to continue.
              </p>
            </div>
          `;
        }

        return `
          <div class="text-screen">
            <h1>A little more practice is needed</h1>

            <p>
              Your practice accuracy was
              <strong>${accuracyPercent}%</strong>.
            </p>

            <p>
              You need more than 80% accuracy to proceed, so the six practice
              trials will restart.
            </p>

            <p class="continue-prompt">
              Press any key to repeat the practice.
            </p>
          </div>
        `;
      },

      data: {
        task: "practice_result"
      },

      on_finish: function(data) {
        var latestAttempt =
          jsPsych.data
            .get()
            .filter({ task: "practice_target" })
            .last(practice_stimuli.length);

        var accuracy =
          calculateAccuracy(latestAttempt);

        data.practice_accuracy = accuracy;
        data.practice_passed =
          accuracy > PRACTICE_PASS_THRESHOLD;
      }
    };


    /*
     * loop_function receives the data from the most recent practice
     * iteration. Returning true repeats the practice. Returning false allows
     * the experiment to continue.
     */
    var practice_loop = {
      timeline: [
        practice_procedure,
        practice_result_screen
      ],

      loop_function: function(data) {
        var practiceTargets =
          data.filter({ task: "practice_target" });

        var accuracy =
          calculateAccuracy(practiceTargets);

        return accuracy <= PRACTICE_PASS_THRESHOLD;
      }
    };

    // 7. REAL-EXPERIMENT START SCREEN
    // ================================================================

    var real_experiment_start = {
      type: jsPsychHtmlKeyboardResponse,

      stimulus: `

    // 8. LOAD REAL-EXPERIMENT STIMULI FROM CSV

     * main_stimuli.csv is editable in Excel and is loaded in both modes:
     * - locally from http://localhost:8000/main_stimuli.csv
     * - online from the same GitHub Pages folder as this HTML file
     *
     * Any extra spreadsheet columns are preserved and written to the data
     * file as additional columns on each main_target row.
     */
    var loadedMainStimuli =
      await loadMainStimuli(MAIN_STIMULI_FILE);

    var main_stimuli = loadedMainStimuli.stimuli;
    var main_stimulus_columns = loadedMainStimuli.headers;
    var main_blocks =
      divideIntoFourBlocks(

    // ================================================================
    // 9. REAL-EXPERIMENT TRIAL SEQUENCE
    // ================================================================

    /*
     * The real trials use the same single-canvas sequence as practice.
     * The plugin records avg_frame_time automatically; this is useful for
     * identifying trials or devices with unstable visual refresh timing.
     */
    /*
     * Turn every spreadsheet column into a jsPsych timeline-variable field,
     * so custom columns that you add in Excel are also retained in the CSV.
     */
    var mainStimulusDataFields = {};
    main_stimulus_columns.forEach(function(columnName) {
      mainStimulusDataFields[columnName] =
        jsPsych.timelineVariable(columnName);
    });

    [
      "experimental_block",
      "block_trial",
      "randomized_trial_order"
    ].forEach(function(columnName) {
      mainStimulusDataFields[columnName] =
        jsPsych.timelineVariable(columnName);
    });

    var main_masked_trial = {
      type: jsPsychPsychophysics,

      stimuli: [
        makePsychophysicsText(
          "######",
          0,
          MASK_DURATION_MS
        ),

        makePsychophysicsText(
          function() {
            return jsPsych.evaluateTimelineVariable("prime");

          MASK_DURATION_MS,
          MASK_DURATION_MS + PRIME_DURATION_MS
        ),

        makePsychophysicsText(
          function() {
            return jsPsych.evaluateTimelineVariable("target");
          },
          MASK_DURATION_MS + PRIME_DURATION_MS
        )
      ],

      background_color: "rgb(127, 127, 127)",
      choices: ["f", "j"],
      response_start_time:
        MASK_DURATION_MS + PRIME_DURATION_MS,
      response_ends_trial: true,

      data: Object.assign(
        {},
        mainStimulusDataFields,
        {
          task: "main_target",
          phase: "main",
          timing_method: "psychophysics_requestAnimationFrame",
          requested_mask_duration_ms: MASK_DURATION_MS,
          requested_prime_duration_ms: PRIME_DURATION_MS,

    /*
     * This function creates each pause screen. Passing the block number into
     * the function avoids writing nearly identical pause code three times.
     */
    function makePauseScreen(completedBlock) {
      return {
        type: jsPsychHtmlKeyboardResponse,

        stimulus: `
          <div class="text-screen">

            <p class="continue-prompt">

            </p>
          </div>
        `,

        data: {
          task: "pause",
          block_completed: completedBlock
        },

        on_load: function() {
          jsPsych.progressBar.progress =
            completedBlock / 4;
        }
      };
    }


    /*
     * The spreadsheet is shuffled once and divided automatically into
     * four nearly equal blocks. The resulting order is retained.
     */
    for (
      var blockNumber = 1;
      blockNumber <= 4;
      blockNumber++
    ) {
      var stimuliForThisBlock =
        main_blocks[
          blockNumber - 1
        ];

      var experimentalBlock = {
        timeline: [
          main_masked_trial
        ],

        timeline_variables:
          stimuliForThisBlock,

        randomize_order: false
      };

      timeline.push(experimentalBlock);

      if (blockNumber < 4) {
        timeline.push(
          makePauseScreen(blockNumber)
        );
      }
    }

    var final_screen = {
      type: jsPsychHtmlKeyboardResponse,

            .get()

          trials.filter({ correct: true });

          calculateAccuracy(trials);

          Math.round(accuracy * 100);

        var meanRt =
          correctTrials.count() > 0

            : "N/A";

        return `
          <div class="text-screen">
            <h1>The main task is complete!</h1>

            <p>
              Your accuracy in the experiment was
              <strong>${accuracyPercent}%</strong>.
            </p>

            <p>

            </p>

            <p class="continue-prompt">

        `;
      },

      data: {
        task: "final_summary"

      on_load: function() {

    function configureConditionalSurveySection(
      controllingName,
      visibleValue,
      containerId
    ) {
      var controls =
        document.querySelectorAll(
          'input[name="' +
          controllingName +
          '"]'
        );

      var container =
        document.getElementById(
          containerId
        );

      function updateSection() {
        var selected =
          document.querySelector(
            'input[name="' +
            controllingName +
            '"]:checked'
          );

        var shouldShow =
          selected &&
          selected.value === visibleValue;

        container.classList.toggle(
          "visible",
          Boolean(shouldShow)
        );

        container
          .querySelectorAll(
            "input, select, textarea"
          )
          .forEach(function(control) {
            control.disabled =
              !shouldShow;

            control.required =
              Boolean(shouldShow) &&
              control.dataset
                .requiredWhenVisible ===
                "true";

            if (!shouldShow) {
              if (
                control.type === "radio" ||
                control.type === "checkbox"
              ) {
                control.checked = false;
              } else {
                control.value = "";
              }
            }
          });
      }

      controls.forEach(function(control) {
        control.addEventListener(
          "change",
          updateSection
        );
      });

      updateSection();
    }

      form.addEventListener(

                jsPsych.getDisplayElement();

              displayElement.innerHTML =
                '<p style="font-size: 24px;">' +
                'Data saved successfully in the local data folder.' +
                '</p>' +
                '<p>You can close this window.</p>';
            })
            .catch(function(error) {
              console.error("Local data-saving error:", error);

              var displayElement =
                document.querySelector("#jspsych-content") ||
                jsPsych.getDisplayElement();

              displayElement.innerHTML =
                '<p style="font-size: 24px;">' +
                'The local data could not be saved.' +
                '</p>' +
                '<p>' + error.message + '</p>';
            });
        }
      };

      timeline.push(local_save_block);
    } else {
      /*
       * ONLINE MODE
       * GitHub Pages serves the experiment. jsPsychPipe sends the complete
       * CSV to the OSF component connected to the DataPipe Experiment ID.
       */
      var datapipe_save_trial = {
        type: jsPsychPipe,
        action: "save",
        experiment_id: DATAPIPE_EXPERIMENT_ID,
        filename: dataFileStem + ".csv",
        data_string: function() {
          return jsPsych.data
            .get()
            .ignore("stimulus")
            .csv();
        },
        data: {
          task: "datapipe_save"
        }
      };

      timeline.push(datapipe_save_trial);

      var online_save_confirmation = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus:
          '<p style="font-size: 24px;">' +
          'Data saved successfully.' +
          '</p>' +
          '<p>You can close this window.</p>',
        choices: "NO_KEYS",
        data: {
          task: "online_save_confirmation"
        }
      };

      timeline.push(online_save_confirmation);
    }


    // ================================================================
    // 13. START THE EXPERIMENT
    // ================================================================

    jsPsych.run(timeline);
    }

    startExperiment().catch(function(error) {
      console.error("Experiment startup error:", error);

      document.body.innerHTML = `
        <main style="
          max-width: 850px;
          margin: 60px auto;
          padding: 30px;
          color: white;
          font-family: Arial, sans-serif;
          line-height: 1.5;
        ">
          <h1>Experiment could not start</h1>
          <p>${error.message}</p>
          <p>Open the browser developer console for additional details.</p>
        </main>
      `;
    });
  </script>
</html>
