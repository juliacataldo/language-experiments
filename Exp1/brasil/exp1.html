<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Language Experiment</title>

    <!-- jsPsych core files from your existing local jspsych folder -->
    <script src="jspsych/jspsych.js"></script>
    <link href="jspsych/jspsych.css" rel="stylesheet" type="text/css">

    <!-- Local saving helper used with serve.py -->
    <script src="jspsych/saveData.js"></script>

    <!-- Plugin used for instructions, ratings, feedback, and pauses -->
    <script src="jspsych/plugin-html-keyboard-response.js"></script>

    <!-- DataPipe is used only when the experiment runs online -->
    <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe@0.6.0"></script>

    <style>

      }

      }

      /* Language-background questionnaire */

      .language-survey input[type="text"],
      .language-survey input[type="number"],
      .language-survey select,
      .language-survey textarea {
        box-sizing: border-box;
        width: 100%;
        max-width: 100%;
        padding: 10px 12px;
        border: 1px solid #ffffff;
        border-radius: 5px;
        background: #ffffff;

      }

    </style>

  <body></body>

  <script>
    async function startExperiment() {
      // ==============================================================
      // 1. GENERAL SETTINGS
      // ==============================================================

      /*
       * Change these labels if your task asks a different rating question.
       *
       * The current wording is appropriate for semantic norming:
       * participants judge how well the sentence describes the word's
       * meaning.
       */
      var RATING_QUESTION =
        "How well does the paraphrase describe the meaning of the word?";

      var LOW_ENDPOINT_LABEL = "1 — Very poor fit";
      var HIGH_ENDPOINT_LABEL = "7 — Perfect fit";

      /*
       * Upload the approved consent PDF to the same folder as this file
       * and name it consent.pdf. Change this value only if you use a
       * different filename.
       */
      var CONSENT_PDF_FILE = "consent.pdf";

      /*
       * Keep main_stimuli.csv in the same folder as this HTML file.
       *
       * Replace the DataPipe placeholder before putting the experiment
       * online. Do not put your private OSF token in this file.
       */
      var PRACTICE_STIMULI_FILE = "practice_stimuli.csv";
      var MAIN_STIMULI_FILE = "main_stimuli.csv";
      var DATAPIPE_EXPERIMENT_ID =
        "O7bfIHuan3Jc";

      /*
       * Automatic saving mode:
       * - localhost / 127.0.0.1 / 0.0.0.0: serve.py saves locally
       * - GitHub Pages or another online host: DataPipe saves to OSF
       */
      var LOCAL_HOSTNAMES = [
        "localhost",
        "127.0.0.1",
        "0.0.0.0"
      ];

      var IS_LOCAL_RUN =
        LOCAL_HOSTNAMES.includes(window.location.hostname);

      var RUN_MODE =
        IS_LOCAL_RUN
          ? "local"
          : "online_datapipe";

      if (window.location.protocol === "file:") {
        throw new Error(
          "This experiment loads practice_stimuli.csv and main_stimuli.csv. Run it through " +
          "http://localhost:8000/ instead of double-clicking exp1.html."
        );
      }

      if (
        !IS_LOCAL_RUN &&
        DATAPIPE_EXPERIMENT_ID ===
          "PASTE_YOUR_DATAPIPE_EXPERIMENT_ID_HERE"
      ) {
        throw new Error(
          "Online saving is not configured. Replace the DataPipe " +
          "Experiment ID placeholder in exp1.html."
        );
      }

      var jsPsych = initJsPsych({
        show_progress_bar: true,
        auto_update_progress_bar: false,
        message_progress_bar: "Experiment progress"
      });

      var timeline = [];

      /*
       * Generate a new random eight-digit participant number for every run.
       * URL parameters, including Prolific IDs, are deliberately ignored.
       */
      function generateRandomEightDigitId() {
        if (
          window.crypto &&
          window.crypto.getRandomValues
        ) {
          var randomValues =
            new Uint32Array(1);

          window.crypto.getRandomValues(
            randomValues
          );

          return String(
            10000000 +
            (
              randomValues[0] %
              90000000
            )
          );
        }

        return String(
          Math.floor(
            10000000 +
            Math.random() * 90000000
          )
        );
      }

      var participantId =
        generateRandomEightDigitId();

      var sessionTimestamp =
        new Date()
          .toISOString()
          .replace(/[^0-9]/g, "")
          .slice(0, 14);

      var dataFileStem =
        "semantic_norming_" +
        participantId +
        "_" +
        sessionTimestamp;

      jsPsych.data.addProperties({
        participant_id: participantId,
        run_mode: RUN_MODE,
        session_timestamp_utc: sessionTimestamp
      });


      // ==============================================================
      // 2. CSV FUNCTIONS
      // ==============================================================

      /*
       * Parse comma-delimited CSV, including:
       * - quoted fields
       * - commas inside quoted sentences
       * - doubled quotation marks
       *
       * In Excel, save the spreadsheet as:
       * CSV UTF-8 (Comma delimited) (.csv)
       */
      function parseCSV(csvText) {
        var rows = [];
        var row = [];
        var field = "";
        var insideQuotes = false;

        for (
          var index = 0;
          index < csvText.length;
          index++
        ) {
          var character = csvText[index];
          var nextCharacter = csvText[index + 1];

          if (character === '"') {
            if (
              insideQuotes &&
              nextCharacter === '"'
            ) {
              field += '"';
              index++;
            } else {
              insideQuotes = !insideQuotes;
            }
          } else if (
            character === "," &&
            !insideQuotes
          ) {
            row.push(field);
            field = "";
          } else if (
            (
              character === "\n" ||
              character === "\r"
            ) &&
            !insideQuotes
          ) {
            if (
              character === "\r" &&
              nextCharacter === "\n"
            ) {
              index++;
            }

            row.push(field);
            field = "";

            if (
              row.some(function(value) {
                return value.trim() !== "";
              })
            ) {
              rows.push(row);
            }

            row = [];
          } else {
            field += character;
          }
        }

        row.push(field);

        if (
          row.some(function(value) {
            return value.trim() !== "";
          })
        ) {
          rows.push(row);
        }

        return rows;
      }


      async function loadMainStimuli(filename) {
        var response =
          await fetch(
            filename,
            { cache: "no-store" }
          );

        if (!response.ok) {
          throw new Error(
            "Could not load " +
            filename +
            ". The server returned HTTP " +
            response.status +
            "."
          );
        }

        var csvText = await response.text();
        var parsedRows = parseCSV(csvText);

        if (parsedRows.length < 2) {
          throw new Error(
            filename +
            " must contain a header row and at least one stimulus row."
          );
        }

        var headers =
          parsedRows[0].map(function(header) {
            return header
              .replace(/^\uFEFF/, "")
              .trim();
          });

        if (
          headers.some(function(header) {
            return header === "";
          })
        ) {
          throw new Error(
            filename +
            " contains a blank column name."
          );
        }

        if (
          new Set(headers).size !==
          headers.length
        ) {
          throw new Error(
            filename +
            " contains duplicate column names."
          );
        }

        var requiredColumns = [
          "item_id",
          "condition",
          "word",
          "sentence"
        ];

        requiredColumns.forEach(
          function(columnName) {
            if (!headers.includes(columnName)) {
              throw new Error(
                filename +
                ' is missing the required column "' +
                columnName +
                '".'
              );
            }
          }
        );

        var stimuli =
          parsedRows
            .slice(1)
            .map(function(values, rowIndex) {
              var item = {};

              headers.forEach(
                function(header, columnIndex) {
                  item[header] =
                    String(
                      values[columnIndex] || ""
                    ).trim();
                }
              );

              if (
                !item.item_id ||
                !item.word ||
                !item.sentence
              ) {
                throw new Error(
                  "CSV row " +
                  (rowIndex + 2) +
                  " has a blank item_id, word, or sentence."
                );
              }

              return item;
            });

        var itemIds =
          stimuli.map(function(item) {
            return item.item_id;
          });

        if (
          new Set(itemIds).size !==
          itemIds.length
        ) {
          throw new Error(
            filename +
            " contains duplicate item_id values."
          );
        }

        return {
          headers: headers,
          stimuli: stimuli
        };
      }


      async function loadPracticeStimuli(filename) {
        var response =
          await fetch(
            filename,
            { cache: "no-store" }
          );

        if (!response.ok) {
          throw new Error(
            "Could not load " +
            filename +
            ". The server returned HTTP " +
            response.status +
            "."
          );
        }

        var csvText = await response.text();
        var parsedRows = parseCSV(csvText);

        if (parsedRows.length !== 4) {
          throw new Error(
            filename +
            " must contain exactly three practice rows plus one header row."
          );
        }

        var headers =
          parsedRows[0].map(function(header) {
            return header
              .replace(/^\uFEFF/, "")
              .trim();
          });

        var requiredColumns = [
          "item_id",
          "word",
          "sentence",
          "accepted_ratings",
          "correct_feedback",
          "incorrect_feedback"
        ];

        requiredColumns.forEach(
          function(columnName) {
            if (!headers.includes(columnName)) {
              throw new Error(
                filename +
                ' is missing the required column "' +
                columnName +
                '".'
              );
            }
          }
        );

        var stimuli =
          parsedRows
            .slice(1)
            .map(function(values, rowIndex) {
              var item = {};

              headers.forEach(
                function(header, columnIndex) {
                  item[header] =
                    String(
                      values[columnIndex] || ""
                    ).trim();
                }
              );

              if (
                !item.item_id ||
                !item.word ||
                !item.sentence ||
                !item.accepted_ratings ||
                !item.correct_feedback ||
                !item.incorrect_feedback
              ) {
                throw new Error(
                  "CSV row " +
                  (rowIndex + 2) +
                  " has a blank required practice field."
                );
              }

              var acceptedRatings =
                item.accepted_ratings
                  .split("|")
                  .map(function(value) {
                    return Number(
                      value.trim()
                    );
                  });

              if (
                acceptedRatings.length === 0 ||
                acceptedRatings.some(
                  function(value) {
                    return (
                      !Number.isInteger(value) ||
                      value < 1 ||
                      value > 7
                    );
                  }
                )
              ) {
                throw new Error(
                  "CSV row " +
                  (rowIndex + 2) +
                  ' has invalid accepted_ratings. Use values such as "5|6|7".'
                );
              }

              item.accepted_ratings =
                acceptedRatings.join("|");

              return item;
            });

        var itemIds =
          stimuli.map(function(item) {
            return item.item_id;
          });

        if (
          new Set(itemIds).size !==
          itemIds.length
        ) {
          throw new Error(
            filename +
            " contains duplicate practice item_id values."
          );
        }

        return stimuli;
      }


      /*
       * Shuffle the complete stimulus list and divide it into four blocks
       * that differ in size by at most one trial. No block column is needed
       * in the spreadsheet.
       */
      function divideIntoFourBlocks(stimuli) {
        if (stimuli.length < 4) {
          throw new Error(
            "The main stimulus spreadsheet must contain at least four trials."
          );
        }

        var shuffledStimuli =
          jsPsych.randomization.shuffle(
            stimuli.slice()
          );

        var blocks = [[], [], [], []];
        var baseBlockSize =
          Math.floor(
            shuffledStimuli.length / 4
          );
        var remainder =
          shuffledStimuli.length % 4;
        var stimulusIndex = 0;
        var overallOrder = 1;

        for (
          var blockIndex = 0;
          blockIndex < 4;
          blockIndex++
        ) {
          var thisBlockSize =
            baseBlockSize +
            (
              blockIndex < remainder
                ? 1
                : 0
            );

          for (
            var position = 1;
            position <= thisBlockSize;
            position++
          ) {
            blocks[blockIndex].push(
              Object.assign(
                {},
                shuffledStimuli[
                  stimulusIndex
                ],
                {
                  experimental_block:
                    blockIndex + 1,
                  block_trial:
                    position,
                  randomized_trial_order:
                    overallOrder
                }
              )
            );

            stimulusIndex++;
            overallOrder++;
          }
        }

        return blocks;
      }


      // ==============================================================
      // 3. RATING-TRIAL FUNCTIONS
      // ==============================================================

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }


      function makeRatingHtml(word, sentence) {
        var buttons = "";

        for (
          var rating = 1;
          rating <= 7;
          rating++
        ) {
          buttons +=
            '<button ' +
              'type="button" ' +
              'class="rating-button" ' +
              'data-rating="' +
              rating +
              '" ' +
              'aria-label="Rating ' +
              rating +
              '">' +
              rating +
            "</button>";
        }

        return `
          <div class="rating-trial">

            <div class="rating-word">
              ${escapeHtml(word)}
            </div>

            <div class="rating-sentence">
              ${escapeHtml(sentence)}
            </div>

            <div
              class="rating-scale"
              role="group"
              aria-label="Escala de avaliação de sete pontos"
            >
              ${buttons}
            </div>

            <div class="rating-endpoints">
              <span class="rating-endpoint-left">
                Muito ruim
              </span>

              <span class="rating-endpoint-right">
                Muito bom
              </span>
            </div>

          </div>
        `;
      }


      /*
       * The html-keyboard-response plugin handles number-key responses.
       *
       * This function adds mouse/touch support to the visible buttons.
       * Button RT is measured from the on_load callback, immediately after
       * the trial display has been inserted into the page.
       */
      function activateRatingButtons() {
        var buttonStartTime = performance.now();
        var buttons =
          document.querySelectorAll(
            ".rating-button"
          );

        buttons.forEach(function(button) {
          button.addEventListener(
            "click",
            function() {
              var rating =
                Number(
                  button.dataset.rating
                );

              buttons.forEach(
                function(currentButton) {
                  currentButton.disabled = true;
                }
              );

              jsPsych.finishTrial({
                response: String(rating),
                rating: rating,
                response_method: "button",
                rt:
                  performance.now() -
                  buttonStartTime
              });
            },
            { once: true }
          );
        });
      }


      function completeRatingData(data) {
        if (
          data.rating === undefined ||
          data.rating === null
        ) {
          data.rating =
            Number(data.response);
        }

        if (!data.response_method) {
          data.response_method =
            "keyboard";
        }
      }


      // ==============================================================
      // 4. CONSENT
      // ==============================================================

      /*
       * The consent form is displayed from consent.pdf. Upload that PDF to
       * the same folder as exp1.html.
       */
      var consentScreen = {
        type: jsPsychHtmlKeyboardResponse,

        stimulus: `
          <div class="text-screen">
            <h1>Welcome to this experiment!</h1>

            <p>
              Please read the consent form below before deciding whether
              you would like to participate.
            </p>

            <iframe
              src="${CONSENT_PDF_FILE}"
              title="Research consent form"
              style="
                width:100%;
                height:65vh;
                border:1px solid rgba(255,255,255,0.65);
                background:white;
              "
            ></iframe>

            <p style="text-align:center;">
              <a
                href="${CONSENT_PDF_FILE}"
                target="_blank"
                rel="noopener"
                style="color:white;text-decoration:underline;"
              >
                Open the consent form in a new tab
              </a>
            </p>

            <p class="continue-prompt">
              If you have read the consent form and agree to participate,
              select <strong>I agree and wish to continue</strong>.
            </p>

            <p class="continue-prompt">
              If you do not agree to participate, select
              <strong>I do not agree</strong>.
            </p>

            <div style="
              display:flex;
              flex-wrap:wrap;
              justify-content:center;
              gap:16px;
              margin-top:24px;
            ">
              <button
                id="consent-accept"
                type="button"
                style="font-size:18px;padding:12px 18px;cursor:pointer;"
              >
                I agree and wish to continue
              </button>

              <button
                id="consent-decline"
                type="button"
                style="font-size:18px;padding:12px 18px;cursor:pointer;"
              >
                I do not agree
              </button>
            </div>
          </div>
        `,

        choices: ["c", "x"],

        data: {
          task: "consent"
        },

        on_load: function() {
          document
            .getElementById("consent-accept")
            .addEventListener(
              "click",
              function() {
                jsPsych.finishTrial({
                  response: "c",
                  response_method: "button"
                });
              },
              { once: true }
            );

          document
            .getElementById("consent-decline")
            .addEventListener(
              "click",
              function() {
                jsPsych.finishTrial({
                  response: "x",
                  response_method: "button"
                });
              },
              { once: true }
            );
        },

        on_finish: function(data) {
          data.consent_given =
            jsPsych.pluginAPI.compareKeys(
              data.response,
              "c"
            );

          if (!data.response_method) {
            data.response_method =
              "keyboard";
          }

          if (!data.consent_given) {
            jsPsych.abortExperiment(
              "<p>Thank you for your interest! You chose not to participate. " +
              "You may close this window.</p>"
            );
          }
        }
      };

      timeline.push(consentScreen);


      // ==============================================================
      // 5. TASK INSTRUCTIONS
      // ==============================================================

      var instructionsScreen = {
        type: jsPsychHtmlKeyboardResponse,

        stimulus: `
          <div class="text-screen">
            <h1>Instructions</h1>

      function configureConditionalSurveySection(
        controllingName,
        visibleValue,
        containerId
      ) {
        var controls =
          document.querySelectorAll(
            'input[name="' +
            controllingName +
            '"]'
          );

        var container =
          document.getElementById(
            containerId
          );

        function updateSection() {
          var selected =
            document.querySelector(
              'input[name="' +
              controllingName +
              '"]:checked'
            );

          var shouldShow =
            selected &&
            selected.value === visibleValue;

          container.classList.toggle(
            "visible",
            Boolean(shouldShow)
          );

          container
            .querySelectorAll(
              "input, select, textarea"
            )
            .forEach(function(control) {
              control.disabled =
                !shouldShow;

              control.required =
                Boolean(shouldShow) &&
                control.dataset
                  .requiredWhenVisible ===
                  "true";

              if (!shouldShow) {
                if (
                  control.type === "radio" ||
                  control.type === "checkbox"
                ) {
                  control.checked = false;
                } else {
                  control.value = "";
                }
              }
            });
        }

        controls.forEach(function(control) {
          control.addEventListener(
            "change",
            updateSection
          );
        });

        updateSection();
      }

                "post_experiment_survey",

              language_survey_rt:
                Math.round(
                  performance.now() -
                  surveyStartTime
                )
            };

            [
              "gender",
              "gender_other",
              "age",
              "education",
              "daily_languages",
              "home_other_language",
              "home_languages",
              "home_exposure_years",
              "home_relative_use",
              "school_work_other_language",
              "school_work_languages",
              "school_work_exposure_years",
              "school_work_relative_use",
              "brazil_growing_up_years",
              "current_country",
              "current_country_years",
              "lived_other_language_places",
              "other_language_places",
              "language_background_comments"
            ].forEach(function(fieldName) {
              trialData[
                "language_" + fieldName
              ] =
                formData.get(fieldName) || "";
            });

            jsPsych.finishTrial(
              trialData
            );
          }
        );
      }


      var languageBackgroundSurvey = {
        type:
          jsPsychHtmlKeyboardResponse,

        stimulus:
          languageBackgroundSurveyHtml,

        choices:
          "NO_KEYS",

        on_load:
          activateLanguageBackgroundSurvey,

        data: {
          task:
            "language_background_survey"
        }
      };

      timeline.push(
        languageBackgroundSurvey
      );

      // ==============================================================
      // 12. SAVE LOCALLY OR THROUGH DATAPIPE
      // ==============================================================

      if (IS_LOCAL_RUN) {
        var localSaveBlock = {
          type: jsPsychHtmlKeyboardResponse,

          stimulus:
            '<p style="font-size:24px;">' +
            'Please hang tight, we are saving your data...' +
            '</p>',

          choices: "NO_KEYS",

          on_load: function() {
            var csvData =
              jsPsych.data
                .get()
                .ignore("stimulus")
                .csv();

            saveData(
              dataFileStem,
              csvData
            )
              .then(function() {
                var displayElement =
                  document.querySelector(
                    "#jspsych-content"
                  ) ||
                  jsPsych.getDisplayElement();

                displayElement.innerHTML =
                  '<p style="font-size:24px;">' +
                  'Data saved successfully!' +
                  '</p>' +
                  '<p>You can close this window now.</p>';
              })
              .catch(function(error) {
                console.error(
                  "Local saving error:",
                  error
                );

                var displayElement =
                  document.querySelector(
                    "#jspsych-content"
                  ) ||
                  jsPsych.getDisplayElement();

                displayElement.innerHTML =
                  '<p style="font-size:24px;">' +
                  'The local data could not be saved.' +
                  '</p>' +
                  '<p>' +
                  escapeHtml(error.message) +
                  '</p>';
              });
          }
        };

        timeline.push(localSaveBlock);
      } else {
        var dataPipeSaveTrial = {
          type: jsPsychPipe,
          action: "save",
          experiment_id:
            DATAPIPE_EXPERIMENT_ID,
          filename:
            dataFileStem + ".csv",

          data_string: function() {
            return jsPsych.data
              .get()
              .ignore("stimulus")
              .csv();
          },

          data: {
            task: "datapipe_save"
          }
        };

        timeline.push(
          dataPipeSaveTrial
        );

        timeline.push({
          type:
            jsPsychHtmlKeyboardResponse,

          stimulus:
            '<p style="font-size:24px;">' +
            'Data saved successfully.' +
            '</p>' +
            '<p>You can close this window.</p>',

          choices: "NO_KEYS",

          data: {
            task:
              "online_save_confirmation"
          }
        });
      }


      // ==============================================================
      // 13. START
      // ==============================================================

      jsPsych.run(timeline);
    }


    startExperiment().catch(
      function(error) {
        console.error(
          "Experiment startup error:",
          error
        );

        document.body.innerHTML = `
          <main style="
            max-width:850px;
            margin:60px auto;
            padding:30px;
            color:white;
            font-family:Arial,sans-serif;
            line-height:1.5;
          ">
            <h1>Experiment could not start</h1>

            <p>
              ${String(error.message)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")}
            </p>

            <p>
              Confirm that practice_stimuli.csv and main_stimuli.csv
              are in the same folder as exp1.html and that the
              experiment is being opened through a server.
            </p>
          </main>
        `;
      }
    );
  </script>
</html>
